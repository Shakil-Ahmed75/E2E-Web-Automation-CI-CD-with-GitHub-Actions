name: Playwright E2E Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # Step 3: Install project dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Step 5: Run Playwright tests
      - name: Run Playwright Tests
        run: npx playwright test --reporter=html,allure-playwright
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          SWAGLABS_USERNAME: ${{ secrets.SWAGLABS_USERNAME }}
          SWAGLABS_PASSWORD: ${{ secrets.SWAGLABS_PASSWORD }}

      # Step 6: Generate Allure report
      - name: Generate Allure Report
        run: npx allure generate allure-results --clean -o allure-report
        if: ${{ always() }}

      # Step 7: Upload HTML report as artifact
      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30

      # Step 8: Upload Allure report as artifact
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      # Optional Step 9: Deploy HTML report to GitHub Pages
      - name: Deploy HTML Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v6
        if: ${{ always() }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report
